name: Modify FIFA 16 APK (Comprehensive Fix)

on:
  workflow_dispatch:

jobs:
  modify:
    name: Fix targetSdk + requiredAccountType + LAUNCHER + Re-sign
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK + tools
        shell: bash
        run: |
          set -euo pipefail
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "build-tools;34.0.0" "platforms;android-34" || true
          sudo apt-get update -qq
          sudo apt-get install -y -qq apktool zipalign
          APKSIGNER=$(find "${ANDROID_HOME}/build-tools" -name apksigner -type f 2>/dev/null | head -1)
          echo "$(dirname "$APKSIGNER")" >> $GITHUB_PATH
          echo "apktool version: $(apktool --version)"
          echo "apksigner path: $APKSIGNER"

      - name: Download APK from DLavie-Launcher-Data
        shell: bash
        run: |
          set -euo pipefail
          echo "Downloading APK from DLavie-Launcher-Data..."
          curl -L -s -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/octet-stream" \
            -o fifa16-original.apk \
            "https://api.github.com/repos/drmacze/DLavie-Launcher-Data/releases/assets/463704916"
          ls -lh fifa16-original.apk
          file fifa16-original.apk
          # Verify it's a valid APK
          if ! unzip -t fifa16-original.apk > /dev/null 2>&1; then
            echo "ERROR: Downloaded file is not a valid APK"
            exit 1
          fi
          echo "✅ APK valid"

      - name: Decode APK with apktool
        shell: bash
        run: |
          set -euo pipefail
          apktool d -f -o fifa16-decoded fifa16-original.apk
          echo "=== apktool.yml content ==="
          cat fifa16-decoded/apktool.yml
          echo ""
          echo "=== AndroidManifest.xml (key lines) ==="
          grep -n "targetSdk\|minSdk\|requiredAccount\|LAUNCHER\|package=" fifa16-decoded/AndroidManifest.xml

      - name: Fix apktool.yml (targetSdkVersion)
        shell: python
        run: |
          from pathlib import Path
          import re

          yml_path = Path("fifa16-decoded/apktool.yml")
          content = yml_path.read_text()

          # Show original
          for line in content.split('\n'):
              if 'SdkVersion' in line:
                  print(f"BEFORE: {line.strip()}")

          # Fix targetSdkVersion: '26' → '34'
          # apktool.yml format: targetSdkVersion: '26'
          content = re.sub(
              r"targetSdkVersion:\s*'?(\d+)'?",
              "targetSdkVersion: '34'",
              content
          )

          # Verify
          for line in content.split('\n'):
              if 'SdkVersion' in line:
                  print(f"AFTER:  {line.strip()}")

          yml_path.write_text(content)
          print("✅ apktool.yml targetSdkVersion → 34")

      - name: Fix AndroidManifest.xml (remove requiredAccountType + LAUNCHER)
        shell: python
        run: |
          import re
          from pathlib import Path

          manifest = Path("fifa16-decoded/AndroidManifest.xml")
          content = manifest.read_text()

          changes = []

          # 1. Remove requiredAccountType
          if 'requiredAccountType' in content:
              content = re.sub(r'\s*android:requiredAccountType="[^"]*"', '', content)
              changes.append("requiredAccountType removed")
          else:
              changes.append("requiredAccountType already absent")

          # 2. Remove LAUNCHER category
          launcher_pattern = re.compile(
              r'<category\s+android:name="android\.intent\.category\.LAUNCHER"\s*/?>',
              re.IGNORECASE
          )
          matches = launcher_pattern.findall(content)
          if matches:
              content = launcher_pattern.sub('', content)
              content = re.sub(r'\n\s*\n\s*\n', '\n\n', content)
              changes.append(f"LAUNCHER category removed ({len(matches)} found)")
          else:
              changes.append("LAUNCHER category already absent")

          # 3. Ensure targetSdk=34 in manifest too (belt-and-suspenders)
          content = re.sub(
              r'(android:targetSdkVersion=")(\d+)(")',
              r'\g<1>34\g<3>',
              content
          )
          changes.append("targetSdkVersion set to 34 in manifest")

          manifest.write_text(content)

          for c in changes:
              print(f"✅ {c}")

          # Verify
          print("\n=== Verification ===")
          mcontent = manifest.read_text()
          print(f"requiredAccountType present: {'requiredAccountType' in mcontent}")
          print(f"LAUNCHER present: {'LAUNCHER' in mcontent}")
          for line in mcontent.split('\n'):
              if 'targetSdk' in line:
                  print(f"targetSdk line: {line.strip()}")

      - name: Rebuild APK
        shell: bash
        run: |
          set -euo pipefail
          apktool b -f -o fifa16-rebuilt.apk fifa16-decoded
          ls -lh fifa16-rebuilt.apk

          # Verify rebuilt APK is valid
          if ! unzip -t fifa16-rebuilt.apk > /dev/null 2>&1; then
            echo "ERROR: Rebuilt APK is corrupted"
            exit 1
          fi
          echo "✅ Rebuilt APK valid"

      - name: Zip-align
        shell: bash
        run: |
          zipalign -v -p 4 fifa16-rebuilt.apk fifa16-aligned.apk 2>&1 | tail -3
          ls -lh fifa16-aligned.apk

      - name: Sign with V1+V2+V3 (DLavie keystore)
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.SIGNING_KEYSTORE }}" | base64 -d > /tmp/dlavie.keystore
          apksigner sign \
            --ks /tmp/dlavie.keystore \
            --ks-key-alias ${{ secrets.SIGNING_KEY_ALIAS }} \
            --ks-pass pass:${{ secrets.SIGNING_KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.SIGNING_KEY_PASSWORD }} \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out fifa16-final.apk \
            fifa16-aligned.apk
          ls -lh fifa16-final.apk

      - name: Comprehensive verification
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Signature verification ==="
          apksigner verify --verbose fifa16-final.apk 2>&1 | head -15

          echo ""
          echo "=== V1+V2 check ==="
          python3 -c "
          import zipfile
          with zipfile.ZipFile('fifa16-final.apk') as z:
              meta = [n for n in z.namelist() if n.startswith('META-INF/')]
              has_v1_rsa = any(n.endswith('.RSA') or n.endswith('.DSA') for n in meta)
              has_v1_mf = 'META-INF/MANIFEST.MF' in z.namelist()
              print(f'V1 (MANIFEST.MF + .RSA): {\"✅\" if has_v1_rsa and has_v1_mf else \"❌\"}')
              print(f'META-INF files: {meta}')
          with open('fifa16-final.apk', 'rb') as f:
              has_v2 = b'APK Sig Block 42' in f.read()
              print(f'V2/V3: {\"✅\" if has_v2 else \"❌\"}')
          "

          echo ""
          echo "=== Resource verification (no mixup) ==="
          python3 -c "
          import zipfile
          with zipfile.ZipFile('fifa16-final.apk') as z:
              names = z.namelist()
              # Check key resources exist
              has_dex = any('classes' in n and n.endswith('.dex') for n in names)
              has_assets = any(n.startswith('assets/') for n in names)
              has_lib = any(n.startswith('lib/') for n in names)
              has_manifest = 'AndroidManifest.xml' in names
              has_resources = 'resources.arsc' in names
              print(f'AndroidManifest.xml: {\"✅\" if has_manifest else \"❌\"}')
              print(f'classes.dex: {\"✅\" if has_dex else \"❌\"}')
              print(f'assets/: {\"✅\" if has_assets else \"❌\"}')
              print(f'lib/ (native): {\"✅\" if has_lib else \"❌\"}')
              print(f'resources.arsc: {\"✅\" if has_resources else \"❌\"}')
              print(f'Total files: {len(names)}')
              # Check ABIs
              abis = set()
              for n in names:
                  if n.startswith('lib/'):
                      abis.add(n.split('/')[1])
              print(f'ABIs: {abis}')
          "

          echo ""
          echo "=== File size comparison ==="
          echo "Original: $(stat -c%s fifa16-original.apk) bytes"
          echo "Modified: $(stat -c%s fifa16-final.apk) bytes"

      - name: Upload to DLavie-Launcher-Data repo (new release v26-compatible)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          # Create new release in DLavie-Launcher-Data
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "tag_name": "v26-compatible",
              "target_commitish": "main",
              "name": "DLavie 26 — Compatible (targetSdk=34, no requiredAccountType)",
              "body": "Modified APK: targetSdk=34, requiredAccountType removed, LAUNCHER removed, V1+V2+V3 signed.\n\nUse this APK for Android 7-16 compatibility.",
              "draft": false,
              "prerelease": false
            }' \
            "https://api.github.com/repos/drmacze/DLavie-Launcher-Data/releases")

          RELEASE_ID=$(echo "$RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin).get('id',''))" 2>/dev/null)

          if [ -z "$RELEASE_ID" ]; then
            echo "Release might already exist, trying to get existing..."
            RESPONSE=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/drmacze/DLavie-Launcher-Data/releases/tags/v26-compatible")
            RELEASE_ID=$(echo "$RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin).get('id',''))" 2>/dev/null)
          fi

          echo "Release ID: $RELEASE_ID"

          # Upload APK as asset
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @fifa16-final.apk \
            "https://uploads.github.com/repos/drmacze/DLavie-Launcher-Data/releases/$RELEASE_ID/assets?name=DLavie26-Compatible.apk" | python3 -c "
          import json,sys
          r = json.load(sys.stdin)
          if 'id' in r:
              print(f'✅ APK uploaded: {r[\"size\"]:,} bytes')
              print(f'Download URL: {r[\"browser_download_url\"]}')
          else:
              print(f'Error: {r}')
          "

      - name: Also upload to Supabase Storage (backup)
        shell: bash
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -s -X POST \
            "https://lvmucsxbmadtsgrxuwmo.supabase.co/storage/v1/object/apk-dist/fifa16/DLavie26-Compatible.apk" \
            -H "apikey: $SUPABASE_KEY" -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/vnd.android.package-archive" -H "x-upsert: true" \
            --data-binary @fifa16-final.apk --max-time 300
          echo ""
          echo "✅ Also uploaded to Supabase Storage as backup"

      - uses: actions/upload-artifact@v4
        with:
          name: fifa16-compatible-apk
          path: fifa16-final.apk
          if-no-files-found: error

      - name: Cleanup
        if: always()
        run: rm -f /tmp/dlavie.keystore

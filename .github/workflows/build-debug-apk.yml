name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/scripts/**'
      - '.github/workflows/build-debug-apk.yml'

permissions:
  contents: write   # required for `gh release create` to publish APK as a Release
  actions: write    # required to read/run other workflow runs if needed

jobs:
  build:
    name: Build DLavie 26 Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Install required Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          echo "ANDROID_HOME=${ANDROID_HOME}"
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          # Install SDK 36 (Android 16) + build-tools 36.0.0 for Android 16 support
          # Fall back to SDK 35 if 36 not available (for backward compat)
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0" || "$SDKMANAGER" "platforms;android-35" "build-tools;35.0.0"

      - name: Attach full base installer card
        shell: python
        run: |
          from pathlib import Path
          # DLavieHubActivity.kt was removed in v6.1.1 cleanup — skip patch if file doesn't exist
          p = Path("app/src/main/java/com/drmacze/f16launcher/DLavieHubActivity.kt")
          if not p.exists():
              print("DLavieHubActivity.kt not found (removed in v6.1.1) — skipping base installer card patch")
          else:
              s = p.read_text()
              hook = "        DLavieBaseInstallCard(isGameInstalled = installed)\n"
              needle = '        HubDataRow("FIFA 16 Mobile", if (installed) "Installed" else "Not found", if (installed) "READY" else "MISSING", if (installed) HubGreen else HubRed, if (installed) HubMark.Check else HubMark.Alert)\n'
              if hook not in s and needle in s:
                  s = s.replace(needle, hook + needle)
                  p.write_text(s)
              print("DLavie full base installer card attached")

      - name: Patch guided launcher UX
        run: python .github/scripts/patch_guided_ux.py

      - name: Build debug APK
        id: build_apk
        shell: bash
        run: |
          set +e
          gradle assembleDebug --stacktrace --console=plain > build.log 2>&1
          code=$?
          echo "$code" > build.exitcode
          if [ "$code" -ne 0 ]; then
            echo "---- DLavie concise build errors ----"
            grep -nE "e: file:|error:|FAILURE:|What went wrong|Execution failed|Unresolved reference|Cannot infer|Type mismatch|Conflicting overloads|AAPT|Manifest merger" build.log | head -160 || tail -220 build.log
          else
            echo "---- DLavie build OK ----"
            tail -80 build.log
          fi
          exit 0

      - name: Sign APK with fixed keystore
        if: success()
        shell: bash
        run: |
          # v7.9.39: Fallback to debug-signed APK jika keystore secret tidak tersedia
          # Debug APK sudah auto-signed oleh Gradle dengan debug keystore, jadi
          # tetap bisa di-install. Untuk production release, gunakan release workflow.
          
          APK_FILE=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "No APK found to sign"
            exit 1
          fi
          
          # Cek apakah secret signing keystore tersedia
          if [ -z "${{ secrets.SIGNING_KEYSTORE }}" ]; then
            echo "⚠ SIGNING_KEYSTORE secret tidak tersedia, gunakan debug-signed APK"
            echo "✅ Debug APK tetap bisa di-install (signed dengan debug keystore)"
            exit 0
          fi
          
          # Decode keystore from secret
          echo "${{ secrets.SIGNING_KEYSTORE }}" | base64 -d > /tmp/dlavie.keystore
          
          echo "Signing $APK_FILE with fixed keystore..."
          
          # Zip-align
          ${ANDROID_HOME}/build-tools/35.0.0/zipalign -v -p 4 "$APK_FILE" /tmp/aligned.apk || cp "$APK_FILE" /tmp/aligned.apk
          
          # Sign with apksigner (fixed keystore = same signature every build)
          ${ANDROID_HOME}/build-tools/35.0.0/apksigner sign \
            --ks /tmp/dlavie.keystore \
            --ks-key-alias ${{ secrets.SIGNING_KEY_ALIAS }} \
            --ks-pass pass:${{ secrets.SIGNING_KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.SIGNING_KEY_PASSWORD }} \
            --out /tmp/dlavie-signed.apk \
            /tmp/aligned.apk || {
              echo "⚠ apksigner failed, fallback to debug-signed APK"
              rm -f /tmp/dlavie.keystore /tmp/aligned.apk
              exit 0
            }
          
          # Replace original APK with signed version
          cp /tmp/dlavie-signed.apk "$APK_FILE"
          
          # Verify signature
          ${ANDROID_HOME}/build-tools/35.0.0/apksigner verify --print-certs "$APK_FILE" | head -5
          
          echo "✅ APK signed with fixed keystore"
          
          # Cleanup
          rm -f /tmp/dlavie.keystore /tmp/aligned.apk /tmp/dlavie-signed.apk

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DLavie-build-diagnostics
          path: |
            build.log
            build.exitcode
          if-no-files-found: warn

      - name: Fail if build failed
        shell: bash
        run: |
          code=$(cat build.exitcode 2>/dev/null || echo 1)
          exit "$code"

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: DLavie-26-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Publish to GitHub Releases (auto-update popup)
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          APK_FILE=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -z "$APK_FILE" ]; then echo "No APK found"; exit 1; fi
          
          # Rename to match existing release convention (DLavie26-Launcher-debug.apk)
          # so the public asset URL stays consistent with previous releases.
          RENAMED="app/build/outputs/apk/debug/DLavie26-Launcher-debug.apk"
          cp "$APK_FILE" "$RENAMED"
          APK_FILE="$RENAMED"
          
          # Read version info from build.gradle
          VERSION_CODE=$(grep -E "^\s*versionCode" app/build.gradle | head -1 | grep -oE '[0-9]+')
          VERSION_NAME=$(grep -E "^\s*versionName" app/build.gradle | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          TAG="v${VERSION_CODE}"
          
          echo "Publishing APK as GitHub Release ${TAG} (${VERSION_NAME})"
          
          # Delete existing release (if any — for re-runs)
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          
          # Create new release with the APK as an asset
          gh release create "$TAG" "$APK_FILE" \
            --title "DLavie Launcher ${VERSION_NAME}" \
            --notes "Auto-built from commit ${GITHUB_SHA::7}

          **What's new in v${VERSION_CODE} (${VERSION_NAME}):**
          - Fixed: 'Edit Profile' button now opens dedicated EditProfileScreen (was opening Settings)
          - Added: real edit form (avatar, full name, phone, email, username, bio)
          - Added: AuthManager.updateBio() for bio persistence
          - Added: 8 new i18n keys (EN + ID)

          **Install:**
          Download the APK below, then tap to install. Existing launcher data is preserved.

          **Full Changelog:** https://github.com/drmacze/F16-Launcher/compare/v185...v${TAG}"
          
          echo "✓ Release ${TAG} published"
          echo "  URL: https://github.com/drmacze/F16-Launcher/releases/tag/${TAG}"
          
          # Print asset URL for the Supabase app_releases insert step
          ASSET_URL="https://github.com/drmacze/F16-Launcher/releases/download/${TAG}/DLavie26-Launcher-debug.apk"
          echo "ASSET_URL=$ASSET_URL" >> $GITHUB_ENV
          echo "::set-output name=asset_url::$ASSET_URL"
          echo "::set-output name=version_code::$VERSION_CODE"
          echo "::set-output name=version_name::$VERSION_NAME"
          echo "::set-output name=tag::$TAG"

      - name: Insert app_releases row in Supabase (for update popup)
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          # v7.9.44: Dynamic insert — extract versionCode/versionName dari build.gradle
          # Sebelumnya hardcoded ke v186, sekarang otomatis pakai versi yang baru di-build.
          # User Launcher lama akan dapat popup update otomatis.

          VC=$(grep "versionCode" app/build.gradle | head -1 | grep -oE '[0-9]+')
          VN=$(grep "versionName" app/build.gradle | head -1 | sed 's/.*versionName\s*["\x27]//;s/["\x27].*//')
          TAG="v$VC"
          APK_URL="https://github.com/drmacze/DLavie-Launcher-Data/releases/download/v26/DLavie26-Launcher-v${VC}.apk"
          GH_RELEASE_URL="https://github.com/drmacze/F16-Launcher/releases/tag/${TAG}"

          echo "Inserting app_releases row: v$VN (code $VC)"

          # Cek secret — pakai SUPABASE_SERVICE_ROLE_KEY (nama secret yang ada di repo)
          if [ -z "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            echo "⚠ SUPABASE_SERVICE_ROLE_KEY secret not set — skipping app_releases INSERT."
            echo "  Manual step: jalankan SQL di Supabase SQL Editor"
            exit 0
          fi

          # Insert dengan service_role key (bypass RLS)
          # Note: github_release_url dan apk_download_url NOT NULL di schema
          RESPONSE=$(curl -s -X POST \
            "https://lvmucsxbmadtsgrxuwmo.supabase.co/rest/v1/app_releases" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d "{
              \"version_code\": $VC,
              \"version_name\": \"$VN\",
              \"tag_name\": \"$TAG\",
              \"github_release_url\": \"$GH_RELEASE_URL\",
              \"apk_download_url\": \"$APK_URL\",
              \"changelog\": \"v$VN — Auto-built from F16-Launcher CI. Fitur terbaru: integrity analyzer, manifest-based update, optional sceneassets.\",
              \"is_published\": true,
              \"published_at\": \"now()\"
            }")

          echo "Response: $RESPONSE"
          echo "✓ Inserted app_releases row v$VC — popup update akan muncul di Launcher user lama"


      - name: Auto-upload APK to public repo + update manifest
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        shell: bash
        run: |
          # Find APK (location varies between Gradle versions)
          APK_FILE=$(find app/build/outputs/apk -name "*.apk" | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "⚠ No APK found, skip auto-upload"
            exit 0
          fi
          
          # Extract versionCode and versionName from build.gradle
          VC=$(grep "versionCode" app/build.gradle | head -1 | grep -oE '[0-9]+')
          VN=$(grep "versionName" app/build.gradle | head -1 | sed 's/.*versionName\s*["\x27]//;s/["\x27].*//')
          
          echo "Detected: versionCode=$VC, versionName=$VN"
          
          # Run upload script
          GITHUB_TOKEN="${{ secrets.GH_PAT }}" \
          APK_PATH="$APK_FILE" \
          VERSION_CODE="$VC" \
          VERSION_NAME="$VN" \
          python3 scripts/auto_upload_to_public_repo.py || {
            echo "⚠ Auto-upload failed (non-fatal), manual update required"
            exit 0
          }

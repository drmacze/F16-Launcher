name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/build-debug-apk.yml'

jobs:
  build:
    name: Build DLavie 26 Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Install required Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          echo "ANDROID_HOME=${ANDROID_HOME}"
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-35" "build-tools;35.0.0"

      - name: Attach full base installer card
        shell: python
        run: |
          from pathlib import Path
          p = Path("app/src/main/java/com/drmacze/f16launcher/DLavieHubActivity.kt")
          s = p.read_text()
          hook = "        DLavieBaseInstallCard(isGameInstalled = installed)\n"
          needle = '        HubDataRow("FIFA 16 Mobile", if (installed) "Installed" else "Not found", if (installed) "READY" else "MISSING", if (installed) HubGreen else HubRed, if (installed) HubMark.Check else HubMark.Alert)\n'
          if hook not in s:
              if needle not in s:
                  raise SystemExit("DLavie base installer hook needle not found")
              s = s.replace(needle, hook + needle)
              p.write_text(s)
          print("DLavie full base installer card attached")

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DLavie-26-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

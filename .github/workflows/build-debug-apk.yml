name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/scripts/**'
      - '.github/workflows/build-debug-apk.yml'

permissions:
  contents: write

jobs:
  build:
    name: Build DLavie 26 Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Install required Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          echo "ANDROID_HOME=${ANDROID_HOME}"
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-35" "build-tools;35.0.0"

      - name: Attach full base installer card
        shell: python
        run: |
          from pathlib import Path
          p = Path("app/src/main/java/com/drmacze/f16launcher/DLavieHubActivity.kt")
          s = p.read_text()
          hook = "        DLavieBaseInstallCard(isGameInstalled = installed)\n"
          needle = '        HubDataRow("FIFA 16 Mobile", if (installed) "Installed" else "Not found", if (installed) "READY" else "MISSING", if (installed) HubGreen else HubRed, if (installed) HubMark.Check else HubMark.Alert)\n'
          if hook not in s and needle in s:
              s = s.replace(needle, hook + needle)
              p.write_text(s)
          print("DLavie full base installer card attached")

      - name: Patch guided launcher UX
        run: python .github/scripts/patch_guided_ux.py

      - name: Build debug APK
        id: build_apk
        shell: bash
        run: |
          set +e
          gradle assembleDebug --stacktrace --console=plain > build.log 2>&1
          code=$?
          echo "$code" > build.exitcode
          if [ "$code" -ne 0 ]; then
            echo "---- DLavie concise build errors ----"
            grep -nE "e: file:|error:|FAILURE:|What went wrong|Execution failed|Unresolved reference|Cannot infer|Type mismatch|Conflicting overloads|AAPT|Manifest merger" build.log | head -160 || tail -220 build.log
          else
            echo "---- DLavie build OK ----"
            tail -80 build.log
          fi
          exit 0

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DLavie-build-diagnostics
          path: |
            build.log
            build.exitcode
          if-no-files-found: warn

      - name: Fail if build failed
        shell: bash
        run: |
          code=$(cat build.exitcode 2>/dev/null || echo 1)
          exit "$code"

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: DLavie-26-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Sign APK with fixed keystore (same signature every build)
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          APK_FILE=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "⚠ No APK found to sign"
            exit 0
          fi
          
          # Check if signing secrets are available
          if [ -z "${{ secrets.SIGNING_KEYSTORE }}" ]; then
            echo "⚠ SIGNING_KEYSTORE secret not set — using debug-signed APK as-is"
            exit 0
          fi
          
          echo "Signing $APK_FILE with fixed keystore..."
          
          # Decode keystore
          echo "${{ secrets.SIGNING_KEYSTORE }}" | base64 -d > /tmp/dlavie.keystore
          
          # Zipalign
          ${ANDROID_HOME}/build-tools/35.0.0/zipalign -f -v 4 "$APK_FILE" /tmp/aligned.apk || cp "$APK_FILE" /tmp/aligned.apk
          
          # Sign with apksigner (v1+v2+v3)
          ${ANDROID_HOME}/build-tools/35.0.0/apksigner sign \
            --ks /tmp/dlavie.keystore \
            --ks-key-alias ${{ secrets.SIGNING_KEY_ALIAS }} \
            --ks-pass pass:${{ secrets.SIGNING_KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.SIGNING_KEY_PASSWORD }} \
            --out /tmp/dlavie-signed.apk \
            /tmp/aligned.apk || {
              echo "⚠ apksigner failed — using debug-signed APK as-is"
              rm -f /tmp/dlavie.keystore /tmp/aligned.apk
              exit 0
            }
          
          # Replace original with signed
          cp /tmp/dlavie-signed.apk "$APK_FILE"
          
          # Verify
          ${ANDROID_HOME}/build-tools/35.0.0/apksigner verify --print-certs "$APK_FILE" | head -5
          
          echo "✅ APK signed with fixed keystore (same signature every build)"
          
          # Cleanup
          rm -f /tmp/dlavie.keystore /tmp/aligned.apk /tmp/dlavie-signed.apk

      - name: Publish to GitHub Releases
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          APK_FILE=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -z "$APK_FILE" ]; then echo "No APK"; exit 0; fi
          
          # Read version from build.gradle so the manifest URL is always in sync
          NEW_VERSION_CODE=$(grep '^        versionCode' "$GITHUB_WORKSPACE/app/build.gradle" | head -1 | sed 's/[^0-9]//g')
          NEW_VERSION_NAME=$(grep '^        versionName' "$GITHUB_WORKSPACE/app/build.gradle" | head -1 | sed 's/.*versionName "//;s/".*//')
          PREDICTABLE_NAME="DLavie26-Launcher-v${NEW_VERSION_CODE}.apk"
          echo "Publishing APK: $PREDICTABLE_NAME (versionCode=$NEW_VERSION_CODE, versionName=$NEW_VERSION_NAME)"
          
          # Save version for next step
          echo "$NEW_VERSION_CODE" > /tmp/version_code.txt
          echo "$NEW_VERSION_NAME" > /tmp/version_name.txt
          
          TAG="v${{ github.run_number }}"
          gh release create "$TAG" "$APK_FILE" \
            --title "DLavie Launcher ${{ github.run_number }}" \
            --notes "Auto-built from commit ${{ github.sha }} — version $NEW_VERSION_NAME (code $NEW_VERSION_CODE)" \
            --repo drmacze/F16-Launcher || echo "Release create skipped (may already exist)"
          
          # Upload to DLavie-Launcher-Data release v26 with predictable name
          cp "$APK_FILE" "/tmp/$PREDICTABLE_NAME"
          gh release upload v26 "/tmp/$PREDICTABLE_NAME" --repo drmacze/DLavie-Launcher-Data --clobber || echo "Upload to v26 skipped"

      - name: Update manifest.json on DLavie-Launcher-Data (launcher section only)
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          export NEW_VERSION_CODE=$(cat /tmp/version_code.txt)
          export NEW_VERSION_NAME=$(cat /tmp/version_name.txt)
          echo "→ Updating manifest.json launcher section to v$NEW_VERSION_NAME (code $NEW_VERSION_CODE)..."
          
          git clone "https://x-access-token:${GH_TOKEN}@github.com/drmacze/DLavie-Launcher-Data.git" /tmp/data-repo
          cd /tmp/data-repo
          git config user.email "drma801@gmail.com"
          git config user.name "Drmacze DEV"
          
          COMMIT_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          export APK_URL="https://github.com/drmacze/DLavie-Launcher-Data/releases/download/v26/DLavie26-Launcher-v${NEW_VERSION_CODE}.apk"
          export NEW_NOTE="v${NEW_VERSION_NAME}: Auto-built from commit ${COMMIT_SHORT}"
          
          python3 << 'PYEOF'
          import json, os, datetime
          with open('manifest.json', 'r') as f:
              m = json.load(f)
          if 'launcher' not in m:
              m['launcher'] = {}
          code = int(os.environ['NEW_VERSION_CODE'])
          name = os.environ['NEW_VERSION_NAME']
          url  = os.environ['APK_URL']
          note = os.environ['NEW_NOTE']
          m['launcher']['min_version_code']    = m['launcher'].get('min_version_code', 206)
          m['launcher']['latest_version_code'] = code
          m['launcher']['latest_version_name'] = name
          m['launcher']['apk_url']             = url
          notes = m['launcher'].get('release_notes', [])
          if not notes or notes[0] != note:
              notes.insert(0, note)
              m['launcher']['release_notes'] = notes[:5]
          m['updated_at'] = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          with open('manifest.json', 'w') as f:
              json.dump(m, f, indent=2, ensure_ascii=False)
          print('manifest.json launcher section updated →', code, name)
          PYEOF
          
          git add manifest.json
          git commit -m "chore: bump launcher version to $NEW_VERSION_NAME (code $NEW_VERSION_CODE)" || echo "No changes to commit"
          git push origin main
          echo "✓ manifest.json pushed to DLavie-Launcher-Data"


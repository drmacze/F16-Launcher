name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/scripts/**'
      - '.github/workflows/build-debug-apk.yml'

jobs:
  build:
    name: Build DLavie 26 Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Install required Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          echo "ANDROID_HOME=${ANDROID_HOME}"
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-35" "build-tools;35.0.0"

      - name: Attach full base installer card
        shell: python
        run: |
          from pathlib import Path
          p = Path("app/src/main/java/com/drmacze/f16launcher/DLavieHubActivity.kt")
          s = p.read_text()
          hook = "        DLavieBaseInstallCard(isGameInstalled = installed)\n"
          needle = '        HubDataRow("FIFA 16 Mobile", if (installed) "Installed" else "Not found", if (installed) "READY" else "MISSING", if (installed) HubGreen else HubRed, if (installed) HubMark.Check else HubMark.Alert)\n'
          if hook not in s and needle in s:
              s = s.replace(needle, hook + needle)
              p.write_text(s)
          print("DLavie full base installer card attached")

      - name: Patch guided launcher UX
        run: python .github/scripts/patch_guided_ux.py

      - name: Build debug APK
        id: build_apk
        shell: bash
        run: |
          set +e
          gradle assembleDebug --stacktrace --console=plain > build.log 2>&1
          code=$?
          echo "$code" > build.exitcode
          if [ "$code" -ne 0 ]; then
            echo "---- DLavie concise build errors ----"
            grep -nE "e: file:|error:|FAILURE:|What went wrong|Execution failed|Unresolved reference|Cannot infer|Type mismatch|Conflicting overloads|AAPT|Manifest merger" build.log | head -160 || tail -220 build.log
          else
            echo "---- DLavie build OK ----"
            tail -80 build.log
          fi
          exit 0

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DLavie-build-diagnostics
          path: |
            build.log
            build.exitcode
          if-no-files-found: warn

      - name: Fail if build failed
        shell: bash
        run: |
          code=$(cat build.exitcode 2>/dev/null || echo 1)
          exit "$code"

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: DLavie-26-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

name: Modify FIFA 16 APK from DLavie-Launcher-Data

on:
  workflow_dispatch:

jobs:
  modify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install SDK + tools
        shell: bash
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "build-tools;34.0.0" || true
          sudo apt-get update -qq && sudo apt-get install -y -qq apktool zipalign
          APKSIGNER=$(find "${ANDROID_HOME}/build-tools" -name apksigner -type f 2>/dev/null | head -1)
          echo "$(dirname "$APKSIGNER")" >> $GITHUB_PATH
      - name: Download APK from DLavie-Launcher-Data
        shell: bash
        run: |
          curl -L -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            -o fifa16-original.apk \
            "https://api.github.com/repos/drmacze/DLavie-Launcher-Data/releases/assets/463704916"
          ls -lh fifa16-original.apk
      - name: Decode + Fix manifest
        shell: python
        run: |
          import subprocess, re
          from pathlib import Path
          subprocess.run(["apktool", "d", "-f", "-o", "fifa16-decoded", "fifa16-original.apk"], check=True)
          manifest = Path("fifa16-decoded/AndroidManifest.xml")
          c = manifest.read_text()
          c = re.sub(r'(android:targetSdkVersion=")(\d+)(")', r'\g<1>34\g<3>', c)
          c = re.sub(r'\s*android:requiredAccountType="[^"]*"', '', c)
          c = re.sub(r'<category\s+android:name="android\.intent\.category\.LAUNCHER"\s*/?>', '', c, flags=re.IGNORECASE)
          c = re.sub(r'\n\s*\n\s*\n', '\n\n', c)
          manifest.write_text(c)
          print("✅ targetSdk=34, requiredAccountType removed, LAUNCHER removed")
      - name: Rebuild + zipalign + sign
        shell: bash
        run: |
          apktool b -f -o fifa16-rebuilt.apk fifa16-decoded
          zipalign -v -p 4 fifa16-rebuilt.apk fifa16-aligned.apk 2>&1 | tail -1
          echo "${{ secrets.SIGNING_KEYSTORE }}" | base64 -d > /tmp/dlavie.keystore
          apksigner sign \
            --ks /tmp/dlavie.keystore \
            --ks-key-alias ${{ secrets.SIGNING_KEY_ALIAS }} \
            --ks-pass pass:${{ secrets.SIGNING_KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.SIGNING_KEY_PASSWORD }} \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out fifa16-final.apk \
            fifa16-aligned.apk
          ls -lh fifa16-final.apk
      - name: Upload to Supabase Storage
        shell: bash
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -s -X POST \
            "https://lvmucsxbmadtsgrxuwmo.supabase.co/storage/v1/object/apk-dist/fifa16/DLavie26-LauncherOnly.apk" \
            -H "apikey: $SUPABASE_KEY" -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/vnd.android.package-archive" -H "x-upsert: true" \
            --data-binary @fifa16-final.apk --max-time 300
          echo ""
          curl -sI "https://lvmucsxbmadtsgrxuwmo.supabase.co/storage/v1/object/public/apk-dist/fifa16/DLavie26-LauncherOnly.apk" | head -3
      - uses: actions/upload-artifact@v4
        with:
          name: fifa16-modified-apk
          path: fifa16-final.apk
          if-no-files-found: error
      - name: Cleanup
        if: always()
        run: rm -f /tmp/dlavie.keystore

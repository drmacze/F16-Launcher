plugins {
    id 'com.android.application'
}

android {
    namespace 'com.drmacze.f16launcher'
    compileSdk 35

    defaultConfig {
        applicationId 'com.drmacze.f16launcher'
        minSdk 24
        targetSdk 35
        versionCode 2
        versionName '0.2.0'
    }
}

def shizukuVersion = '13.1.5'

dependencies {
    implementation "dev.rikka.shizuku:api:$shizukuVersion"
    implementation "dev.rikka.shizuku:provider:$shizukuVersion"
}
